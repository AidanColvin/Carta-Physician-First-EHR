<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta EHR</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* """ DESIGN TOKENS & RESPONSIVE CORE """ */
:root {
  --unc: #4B9CD3;
  --unc-light: #d6eaf7;
  --unc-mid: #a8d0ec;
  --unc-dark: #2a6fa8;
  --navy: #13294B;
  --bg: #fcfbf9; /* Warm Ivory Base */
  --white: #ffffff;
  --border: #e4eff7;
  --text: #1a1a1a;
  --muted: #6b7280;
  --danger: #c0392b;
  --danger-bg: #fde8e8;
  --warn: #c67c00;
  --ok: #1a5c38;
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; line-height: 1.5; }

/* ── ROUTING ── */
.page { display: none; min-height: 100vh; flex-direction: column; width: 100%; }
.page.active { display: flex; }

/* ── PAGE 1: LOGIN ── */
#page-login { align-items: center; justify-content: center; background: linear-gradient(160deg, #e8f4fc 0%, #fcfbf9 50%, #d6eaf7 100%); }
.login-card { background: var(--white); border-radius: 24px; box-shadow: 0 32px 80px rgba(75,156,211,.14); padding: 48px; width: 420px; max-width: 90%; text-align: center; animation: fadeUp .5s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.login-logo { font-family: 'Lora', serif; font-size: 32px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.login-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--navy); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
.demo-btn { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--unc); background: white; color: var(--unc-dark); font-weight: 600; cursor: pointer; margin-top: 12px; transition: 0.2s; }
.demo-btn:hover { background: var(--unc-light); }

/* ── PAGE 2: CENSUS ── */
.topnav { height: 60px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; sticky; top: 0; z-index: 100; flex-shrink: 0; }
.nav-logo { font-family: 'Lora', serif; font-size: 22px; color: var(--navy); font-weight: 600; letter-spacing: -0.02em; }
.census-container { padding: 32px 28px; max-width: 1100px; margin: 0 auto; width: 100%; }
.census-table { width: 100%; border-collapse: collapse; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.03); }
.census-table th { padding: 14px 16px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--unc); border-bottom: 1.5px solid var(--border); letter-spacing: 0.05em; font-weight: 700; }
.census-table td { padding: 18px 16px; border-bottom: 1px solid #f0f6fb; font-size: 14px; vertical-align: middle; }
.census-table tr:hover { background: #fcfcfd; cursor: pointer; }
.acuity-box { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'DM Mono'; }
.esi-1, .esi-2 { background: #fde8e8; color: #c0392b; }
.esi-3 { background: #fef3dc; color: #7a5010; }
.open-btn { padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: white; color: var(--unc-dark); font-weight: 600; font-size: 12px; cursor: pointer; }

/* ── PAGE 3: THE CHART (NO CROP DESIGN) ── */
.chart-content-area { padding: 24px 20px 80px; flex: 1; overflow-y: auto; }
.chart-card { max-width: 960px; margin: 0 auto; background: var(--white); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(75,156,211,.12); overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--border); }
.patient-header { padding: 24px 32px; display: flex; align-items: center; gap: 20px; background: #f4f9fd; border-bottom: 1px solid var(--border); }
.avatar-lg { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--unc-mid), var(--unc)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px; }
.header-main h2 { font-family: 'Lora'; font-size: 24px; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
.header-meta { font-size: 13px; color: var(--muted); }

/* Tabs Logic */
.tab-container { background: white; border-bottom: 1px solid var(--border); }
.tab-row { display: flex; flex-wrap: wrap; padding: 0 20px; }
.tab-btn { padding: 14px 20px; font-size: 13.5px; color: var(--muted); cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; white-space: nowrap; font-family: 'DM Sans'; transition: 0.2s; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--unc); font-weight: 600; }
.tab-line { height: 1px; background: #f0f6fb; width: 100%; }

/* Panels Logic */
.panel-body { padding: 32px; min-height: 500px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* UI Components */
.vitals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 32px; }
.v-card { background: #fcfbf9; border: 1.5px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
.v-val { font-size: 32px; font-family: 'Lora'; font-weight: 500; color: var(--navy); display: block; }
.v-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 6px; font-weight: 700; }

.section-block { margin-bottom: 36px; }
.section-block h3 { font-family: 'Lora'; font-size: 18px; color: var(--navy); margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-weight: 600; }
.section-block p { font-size: 14.5px; line-height: 1.75; color: #374151; white-space: pre-line; margin-bottom: 16px; }

.demo-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.demo-table td { padding: 12px 16px; border-bottom: 1px solid #f8fbfe; font-size: 14px; }
.demo-table tr td:first-child { width: 180px; font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }

.discharge-action { background: #fee2e2; color: #b91c1c; border: none; padding: 10px 20px; border-radius: 100px; font-weight: 700; font-size: 12px; cursor: pointer; margin-left: auto; }
</style>
</head>
<body>

  <div id="page-login" class="page active">
    <div class="login-card">
      <div class="login-logo">Carta</div>
      <p style="color:var(--muted); font-size:14px; margin-bottom:40px;">Physician-first clinical operating system</p>
      <button class="login-btn" onclick="nav('page-main')">Sign In</button>
      <button class="demo-btn" onclick="nav('page-main')">Open Interactive Demo</button>
    </div>
  </div>

  <div id="page-main" class="page">
    <nav class="topnav">
      <span class="nav-logo">Carta</span>
      <span style="font-size:11px; font-weight:800; color:var(--unc-dark); background:var(--unc-light); padding:4px 12px; border-radius:100px; margin-left:8px;">ER CENSUS</span>
      <div style="flex:1"></div>
      <div style="width:32px; height:32px; background:var(--navy); border-radius:10px; color:white; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; cursor:pointer;" onclick="nav('page-login')">DR</div>
    </nav>
    <div class="census-container">
      <h2 style="font-family:'Lora'; font-size:26px; margin-bottom:8px;">Active Board</h2>
      <table class="census-table">
        <thead>
          <tr><th>ESI</th><th>Patient Name</th><th>Room</th><th>Chief Complaint</th><th>Vitals</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="census-active"></tbody>
      </table>

      <h2 style="font-family:'Lora'; font-size:20px; margin-top:60px; margin-bottom:12px; color:var(--muted)">Discharged Patients</h2>
      <table class="census-table" style="opacity:0.6; pointer-events:none;">
        <tbody id="census-completed"></tbody>
      </table>
    </div>
  </div>

  <div id="page-chart" class="page">
    <nav class="topnav">
      <button class="open-btn" onclick="nav('page-main')">← Census</button>
      <span class="nav-logo" style="margin-left:20px">Carta Clinical Chart</span>
    </nav>
    <div class="chart-content-area" id="chart-mount"></div>
  </div>

  /* """ LOGIC ENGINE """ */
  function nav(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if(pageId === 'page-main') buildCensus();
    window.scrollTo(0, 0);
  }

  function buildCensus() {
    const activeBody = document.getElementById('census-active');
    const completedBody = document.getElementById('census-completed');
    
    activeBody.innerHTML = PATIENTS.filter(p => p.active).map(p => `
      <tr onclick="openChart('${p.id}')">
        <td><div class="acuity-box esi-${p.esi}">${p.esi}</div></td>
        <td><strong>${p.name}</strong><br><small>${p.age} · MRN ${p.mrn}</small></td>
        <td><strong>${p.room}</strong></td>
        <td>${p.cc}</td>
        <td style="font-family:'DM Mono'">${p.vitals.bp} | ${p.vitals.hr}</td>
        <td><span style="width:8px; height:8px; background:var(--warn); border-radius:50%; display:inline-block; margin-right:6px"></span> In Workup</td>
        <td align="right"><button class="open-btn">View Chart →</button></td>
      </tr>`).join('');

    completedBody.innerHTML = PATIENTS.filter(p => !p.active).map(p => `
      <tr>
        <td width="30"></td>
        <td><strong>${p.name}</strong> (MRN ${p.mrn})</td>
        <td>DISCHARGED</td>
        <td>${p.cc}</td>
        <td align="right" colspan="3"><small style="color:var(--muted); font-weight:700">ENCOUNTER FINALIZED</small></td>
      </tr>`).join('');
  }

  function openChart(pid) {
    const p = PATIENTS.find(x => x.id === pid);
    const mount = document.getElementById('chart-mount');
    
    mount.innerHTML = `
      <div class="chart-card">
        <div class="patient-header">
          <div class="avatar-lg">${p.name.split(' ').map(n=>n[0]).join('')}</div>
          <div class="header-main">
            <h2>${p.name}</h2>
            <div class="header-meta">${p.age} · MRN ${p.mrn} · Attending: ${p.attending}</div>
          </div>
          <button class="discharge-action" onclick="discharge('${p.id}')">DISCHARGE PATIENT</button>
        </div>

        <div class="tab-container">
          <div class="tab-row">
            <button class="tab-btn active" data-id="vitals">Vitals</button>
            <button class="tab-btn" data-id="demographics">Demographics</button>
            <button class="tab-btn" data-id="history">History</button>
            <button class="tab-btn" data-id="physical">Physical</button>
            <button class="tab-btn" data-id="ems">EMS Notes</button>

            <button class="tab-btn" data-id="viz">Visualizations</button>
            <button class="tab-btn" data-id="path">Pathology</button>
            <button class="tab-btn" data-id="notes">Progress</button>
            <button class="tab-btn" data-id="meds">Meds</button>
          </div>
        </div>

        <div class="panel-body">
          <div id="vitals" class="tab-panel active">
            <div class="vitals-grid">
              <div class="v-card"><span class="v-val">${p.vitals.bp}</span><span class="v-label">BP mmHg</span></div>
              <div class="v-card"><span class="v-val">${p.vitals.hr}</span><span class="v-label">HR bpm</span></div>
              <div class="v-card"><span class="v-val" style="color:var(--danger)">${p.vitals.temp}°</span><span class="v-label">Temp °C</span></div>
              <div class="v-card"><span class="v-val">${p.vitals.spo2}</span><span class="v-label">SpO2 %</span></div>
            </div>
            <div class="section-block">
              <h3>Vital Stats</h3>
              <p>Height: ${p.height} &emsp; Weight: ${p.weight} &emsp; BMI: ${((parseFloat(p.weight)/Math.pow(parseFloat(p.height)/100,2)).toFixed(1))}</p>
            </div>
          </div>

          <div id="demographics" class="tab-panel">
            <div class="section-block">
              <h3>Patient Registration</h3>
              <table class="demo-table">
                <tr><td>Full Name</td><td>${p.name}</td></tr>
                <tr><td>Date of Birth</td><td>${p.demographics.dob}</td></tr>
                <tr><td>Address</td><td>${p.demographics.address}</td></tr>
                <tr><td>Emergency Contact</td><td>${p.demographics.contact}</td></tr>
                <tr><td>Primary Language</td><td>${p.demographics.language}</td></tr>
                <tr><td>Primary Insurance</td><td>${p.demographics.insurance}</td></tr>
              </table>
            </div>
          </div>

          <div id="history" class="tab-panel"><div class="section-block"><h3>Clinical History & HPI</h3><p>${p.history}</p></div></div>
          <div id="physical" class="tab-panel"><div class="section-block"><h3>Physical Examination</h3><p>${p.physical}</p></div></div>
          <div id="ems" class="tab-panel"><div class="section-block"><h3>EMS Pre-hospital Report</h3><p>${p.ems}</p></div></div>
          <div id="er" class="tab-panel"><div class="section-block"><h3>Emergency Department Course</h3><p>${p.er_notes}</p></div></div>
          
          <div id="labs" class="tab-panel"><div class="section-block"><h3>Laboratory Results</h3>
            <table class="lab-table"><thead><tr><th>Test</th><th>Result</th><th>Reference</th><th>Status</th></tr></thead>
            <tbody>${p.labs.map(l=>`<tr><td>${l.t}</td><td><strong>${l.v}</strong></td><td>${l.r}</td><td style="color:${l.s==='N'?'var(--ok)':'var(--danger)'}">${l.s}</td></tr>`).join('')}</tbody></table>
          </div></div>

          <div id="viz" class="tab-panel"><div class="section-block"><h3>Visualizations & Imaging</h3><p>${p.viz}</p></div></div>
          <div id="path" class="tab-panel"><div class="section-block"><h3>Pathology & Micro</h3><p>${p.pathology}</p></div></div>
          
          <div id="notes" class="tab-panel"><div class="section-block"><h3>Progress Notes</h3>
            <div class="note-entry"><div class="note-meta">MD PROGRESS · ${p.attending}</div><p>${p.notes}</p></div>
          </div></div>
          
          <div id="meds" class="tab-panel"><div class="section-block"><h3>Active Medications</h3>
            ${p.meds.map(m=>`<div class="med-card"><div class="status-dot" style="background:var(--unc)"></div><div><strong style="font-size:14px">${m.n}</strong><br><small style="color:var(--muted)">${m.d}</small></div></div>`).join('')}
          </div></div>
        </div>
      </div>`;

    // WIRE TAB EVENTS
    const tabs = mount.querySelectorAll('.tab-btn');
    const panels = mount.querySelectorAll('.tab-panel');
    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      panels.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      mount.querySelector('#' + t.dataset.id).classList.add('active');
    }));

    nav('page-chart');
  }

  function discharge(id) {
    if(confirm("Confirm patient discharge?")) {
      const p = PATIENTS.find(x => x.id === id);
      p.active = false;
      nav('page-main');
    }
  }

  buildCensus();
</script>
</body>
</html>
