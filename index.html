<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta EHR</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --unc: #4B9CD3;
  --unc-light: #d6eaf7;
  --unc-mid: #a8d0ec;
  --unc-dark: #2a6fa8;
  --navy: #13294B;
  --bg: #f9fbfd;
  --white: #ffffff;
  --border: #e4eff7;
  --text: #1a1a1a;
  --muted: #8a9aaa;
  --warn: #c67c00;
  --danger: #c0392b;
  --ok: #1a5c38;
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

/* ── ROUTING ── */
.page { display: none; min-height: 100vh; flex-direction: column; width: 100%; }
.page.active { display: flex; }

/* ── LOGIN ── */
#page-login { align-items: center; justify-content: center; background: linear-gradient(160deg, #e8f4fc 0%, #f9fbfd 50%, #d6eaf7 100%); }
.login-card { background: var(--white); border-radius: 24px; box-shadow: 0 32px 80px rgba(75,156,211,.14); padding: 48px 44px; width: 420px; max-width: 90%; text-align: center; animation: fadeUp .5s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.login-logo { font-family: 'Lora', serif; font-size: 28px; margin-bottom: 4px; }
.login-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--navy); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
.demo-btn { width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid var(--unc); background: white; color: var(--unc-dark); font-weight: 600; cursor: pointer; margin-top: 12px; }

/* ── CENSUS ── */
.topnav { height: 56px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'Lora', serif; font-size: 20px; color: var(--text); }
.census-header { padding: 24px 28px; display: flex; justify-content: space-between; align-items: flex-end; }
.census-table { width: 100%; border-collapse: collapse; min-width: 760px; margin-bottom: 30px; background: white; border-radius: 12px; overflow: hidden; }
.census-table th { padding: 12px; text-align: left; font-size: 10px; text-transform: uppercase; color: var(--unc); border-bottom: 1px solid var(--border); }
.census-table td { padding: 14px 12px; border-bottom: 1px solid #eef5fb; font-size: 13px; }
.acuity-box { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'DM Mono'; }
.esi-1, .esi-2 { background: #fde8e8; color: #c0392b; }
.esi-3 { background: #fef3dc; color: #7a5010; }
.esi-4, .esi-5 { background: #e1f5eb; color: #1a5c38; }

/* ── CHART ── */
.chart-card { max-width: 860px; margin: 32px auto; background: var(--white); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(75,156,211,.10); overflow: hidden; }
.patient-row { padding: 20px 28px; display: flex; align-items: flex-start; gap: 16px; background: #f4f9fd; border-bottom: 1px solid var(--border); }
.avatar { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--unc-mid), var(--unc)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
.tabs-bar { display: flex; flex-wrap: wrap; background: var(--white); padding: 0 20px; border-bottom: 1px solid var(--border); position: relative; }
.tab-break { width: 100%; height: 0; border-top: 1px solid var(--border); }
.tab-btn { padding: 11px 15px; font-size: 13px; color: var(--muted); cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--unc); font-weight: 600; }
.tab-panel { display: none; }
.tab-panel.active { display: block; padding-bottom: 40px; }

/* Components */
.vitals-grid { display: flex; gap: 12px; flex-wrap: wrap; padding: 26px 28px; }
.vital-card { flex: 1; min-width: 100px; background: #f4f9fd; border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; text-align: center; }
.vital-val { font-size: 26px; font-family: 'Lora', serif; }
.trends-section { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 28px; }
.trend-card { background: #f4f9fd; border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
.bar-bg { flex: 1; height: 7px; background: #deedf7; border-radius: 100px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--unc); border-radius: 100px; }
.content-section { padding: 24px 28px; }
.content-section h3 { font-family: 'Lora'; font-weight: 400; margin-bottom: 16px; font-size: 17px; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { text-align: left; font-size: 10px; text-transform: uppercase; color: var(--unc); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.data-table td { padding: 12px 0; font-size: 13px; border-bottom: 1px solid #f0f6fb; }
.note-entry { border-left: 3px solid var(--unc-light); padding: 12px 16px; margin-bottom: 14px; background: #f8fbfe; border-radius: 0 10px 10px 0; }
.med-pill { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 12px; background: #f4f9fd; border-radius: 12px; border: 1px solid var(--border); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* Buttons */
.open-btn { padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: white; color: var(--unc-dark); font-weight: 600; font-size: 11px; cursor: pointer; }
.discharge-btn { padding: 8px 16px; border-radius: 100px; border: none; background: #fee2e2; color: #b91c1c; font-weight: 700; font-size: 11px; cursor: pointer; transition: 0.2s; }
.discharge-btn:hover { background: #fecaca; }
</style>
</head>
<body>

<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">Carta</div>
    <p style="color:var(--muted); font-size:13px; margin-bottom:30px;">Physician-first electronic health record</p>
    <button class="login-btn" onclick="navTo('page-main')">Sign In</button>
    <button class="demo-btn" onclick="navTo('page-main')">View Interactive Demo</button>
  </div>
</div>

<div id="page-main" class="page">
  <nav class="topnav">
    <span class="nav-logo">Carta</span>
    <span style="font-size:12px; font-weight:600; color:var(--unc-dark); background:var(--unc-light); padding:4px 11px; border-radius:100px; margin-left:10px;">ER CENSUS</span>
    <div style="flex:1"></div>
    <div style="width:32px; height:32px; background:var(--unc); border-radius:10px; color:white; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; cursor:pointer;" onclick="navTo('page-login')">DR</div>
  </nav>
  <div style="padding: 24px 28px;">
    <h2 style="font-family:'Lora'; margin-bottom:4px;">Active Patients</h2>
    <p style="font-size:12px; color:var(--muted); margin-bottom:20px;">Reviewing 5 active arrivals</p>
    <table class="census-table">
      <thead><tr><th>ESI</th><th>Patient</th><th>Room</th><th>Complaint</th><th>Vitals</th><th>Status</th><th></th></tr></thead>
      <tbody id="census-active"></tbody>
    </table>

    <h2 style="font-family:'Lora'; margin-bottom:4px; margin-top:40px; color:var(--muted)">Discharged / Completed</h2>
    <table class="census-table" style="opacity:0.6">
      <tbody id="census-completed"></tbody>
    </table>
  </div>
</div>

<div id="page-chart" class="page">
  <nav class="topnav">
    <button class="open-btn" onclick="navTo('page-main')">← Back to Census</button>
    <span class="nav-logo" style="margin-left:20px">Carta</span>
  </nav>
  <div id="chart-content"></div>
</div>

<script>
/* """ 5 ER PATIENT PROFILES """ */
const PATIENTS = [
  {
    id: 'p1', esi: 3, name: 'Sarah Chen', age: '62F', mrn: '0042817', room: '12', cc: 'Pneumonia (CAP)', active: true,
    attending: 'Dr. Patel', admitted: '3/20', flags: ['PCN Allergy', 'DNR'],
    vitals: { bp: '118/76', hr: '101', temp: '38.9', spo2: '96%', rr: '18' },
    history: 'T2DM, HTN. Non-smoker.',
    physical: 'RLL Crackles heard on auscultation.',
    ems: 'Productive cough x4 days. O2 91% on RA.',
    er: 'ESI 3. Started on Ceftriaxone 1g IV.',
    labs: [{test:'WBC', val:'14.2', ref:'4-11', status:'H'}, {test:'Glucose', val:'182', ref:'70-140', status:'H'}],
    viz: 'CXR: Right Lower Lobe Opacity.',
    pathology: 'Sputum: Gram+ Cocci.',
    notes: 'Stable on 2L NC. Awaiting floor bed.',
    meds: [{name:'Ceftriaxone', dose:'1g IV', color:'var(--unc)'}, {name:'Metformin', dose:'1000mg', color:'var(--ok)'}]
  },
  {
    id: 'p2', esi: 2, name: 'Robert Nguyen', age: '58M', mrn: '0031042', room: 'T1', cc: 'Chest Pain (STEMI)', active: true,
    attending: 'Dr. Torres', admitted: '3/23', flags: ['Cardiac'],
    vitals: { bp: '92/58', hr: '114', temp: '36.8', spo2: '94%', rr: '22' },
    history: 'CAD, HTN, Smoker.',
    physical: 'Diaphoretic, clutching chest.',
    ems: 'ST Elevation in II, III, aVF. ASA given.',
    er: 'Cath Lab activated. Heparin bolus given.',
    labs: [{test:'Troponin', val:'4.82', ref:'<0.04', status:'H'}],
    viz: 'ECG: Acute Inferior Wall MI.',
    pathology: 'N/A',
    notes: 'Moving to Cath Lab now.',
    meds: [{name:'Heparin Gtt', dose:'Titrating', color:'var(--danger)'}, {name:'ASA', dose:'324mg', color:'var(--unc)'}]
  },
  {
    id: 'p3', esi: 1, name: 'Marcus Miller', age: '26M', mrn: '0092110', room: 'T2', cc: 'Opioid Overdose', active: true,
    attending: 'Dr. Torres', admitted: '3/23', flags: ['Critical', 'Fall Risk'],
    vitals: { bp: '102/60', hr: '58', temp: '36.1', spo2: '86%', rr: '6' },
    history: 'Opioid Use Disorder.',
    physical: 'Pinpoint pupils, GCS 6.',
    ems: 'Found unresponsive. Narcan 4mg given.',
    er: 'ESI 1. Bag-mask ventilation initiated.',
    labs: [{test:'pH', val:'7.28', ref:'7.35', status:'L'}],
    viz: 'N/A',
    pathology: 'UDS: Fentanyl Positive.',
    notes: 'Respiratory rate improved to 14 post-Narcan.',
    meds: [{name:'Narcan Drip', dose:'0.4mg/hr', color:'var(--danger)'}]
  },
  {
    id: 'p4', esi: 3, name: 'Elena Rodriguez', age: '42F', mrn: '0061345', room: '24', cc: 'Distal Radius FX', active: true,
    attending: 'Dr. Kim', admitted: '3/23', flags: ['None'],
    vitals: { bp: '148/92', hr: '104', temp: '37.1', spo2: '100%', rr: '18' },
    history: 'Healthy.',
    physical: 'Obvious R wrist deformity.',
    ems: 'Fall from 4ft ladder.',
    er: 'Splinted. Ortho consulted.',
    labs: [{test:'Hgb', val:'14.0', ref:'12-16', status:'N'}],
    viz: 'X-Ray: Displaced Colles Fracture.',
    pathology: 'N/A',
    notes: 'Manual reduction performed successfully.',
    meds: [{name:'Morphine', dose:'4mg IV', color:'var(--warn)'}]
  },
  {
    id: 'p5', esi: 2, name: 'David Walsh', age: '74M', mrn: '0028817', room: '14', cc: 'Acute Stroke', active: true,
    attending: 'Dr. Patel', admitted: '3/23', flags: ['NPO', 'Fall Risk'],
    vitals: { bp: '190/110', hr: '84', temp: '36.9', spo2: '97%', rr: '16' },
    history: 'Afib, HTN.',
    physical: 'L facial droop, NIHSS 14.',
    ems: 'LKW: 1 hour ago.',
    er: 'CT Head negative for hemorrhage.',
    labs: [{test:'INR', val:'1.1', ref:'2-3', status:'L'}],
    viz: 'CTA: R M1 segment occlusion.',
    pathology: 'N/A',
    notes: 'TNK administered. Moving to Neuro IR.',
    meds: [{name:'TNKase', dose:'Once', color:'var(--danger)'}, {name:'Labetalol', dose:'10mg IV', color:'var(--warn)'}]
  }
];

/* """ LOGIC: ROUTING & CENSUS """ */
function navTo(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'page-main') buildCensus();
}

function buildCensus() {
  const activeBody = document.getElementById('census-active');
  const completedBody = document.getElementById('census-completed');
  
  activeBody.innerHTML = PATIENTS.filter(p => p.active).map(p => `
    <tr onclick="openChart('${p.id}')">
      <td><div class="acuity-box esi-${p.esi}">${p.esi}</div></td>
      <td><strong>${p.name}</strong><br><small>${p.age} · ${p.mrn}</small></td>
      <td><strong>${p.room}</strong></td>
      <td>${p.cc}</td>
      <td style="font-family:'DM Mono'">${p.vitals.bp} | ${p.vitals.hr}</td>
      <td><span class="dot" style="background:var(--warn)"></span> Admit Pending</td>
      <td><button class="open-btn">Open →</button></td>
    </tr>`).join('');

  completedBody.innerHTML = PATIENTS.filter(p => !p.active).map(p => `
    <tr>
      <td width="30"><div class="dot" style="background:var(--muted)"></div></td>
      <td><strong>${p.name}</strong> discharged to home/floor.</td>
      <td align="right" style="color:var(--muted)">Session Closed</td>
    </tr>`).join('');
}

function openChart(pid) {
  const p = PATIENTS.find(x => x.id === pid);
  const host = document.getElementById('chart-content');
  host.innerHTML = `
    <div class="chart-card">
      <div class="patient-row">
        <div class="avatar">${p.name.split(' ').map(n=>n[0]).join('')}</div>
        <div style="flex:1">
          <div class="patient-name">${p.name}</div>
          <div style="font-size:12px; color:var(--muted)">${p.age} · MRN ${p.mrn} · Attending: ${p.attending}</div>
        </div>
        <button class="discharge-btn" onclick="discharge('${p.id}')">DISCHARGE PATIENT</button>
      </div>

      <div class="tabs-bar">
        <button class="tab-btn active" data-tab="vitals">Vitals</button>
        <button class="tab-btn" data-tab="history">History</button>
        <button class="tab-btn" data-tab="physical">Physical</button>
        <button class="tab-btn" data-tab="ems">EMS</button>
        <button class="tab-btn" data-tab="er">ER Notes</button>
        <div class="tab-break"></div>
        <button class="tab-btn" data-tab="labs">Labs</button>
        <button class="tab-btn" data-tab="viz">Viz</button>
        <button class="tab-btn" data-tab="path">Path</button>
        <button class="tab-btn" data-tab="notes">Progress</button>
        <button class="tab-btn" data-tab="meds">Meds</button>
      </div>

      <div id="vitals" class="tab-panel active">
        <div class="vitals-grid">
          <div class="vital-card"><div class="vital-val">${p.vitals.bp}</div><small>BP</small></div>
          <div class="vital-card"><div class="vital-val">${p.vitals.hr}</div><small>HR</small></div>
          <div class="vital-card"><div class="vital-val" style="color:var(--danger)">${p.vitals.temp}°</div><small>TEMP</small></div>
          <div class="vital-card"><div class="vital-val">${p.vitals.spo2}</div><small>SPO2</small></div>
        </div>
      </div>
      <div id="history" class="tab-panel"><div class="content-section"><h3>History</h3><p>${p.history}</p></div></div>
      <div id="physical" class="tab-panel"><div class="content-section"><h3>Exam</h3><p>${p.physical}</p></div></div>
      <div id="ems" class="tab-panel"><div class="content-section"><h3>EMS</h3><p>${p.ems}</p></div></div>
      <div id="er" class="tab-panel"><div class="content-section"><h3>ER</h3><p>${p.er}</p></div></div>
      <div id="labs" class="tab-panel"><div class="content-section"><h3>Labs</h3>
        <table class="data-table"><thead><tr><th>Test</th><th>Val</th><th>Ref</th></tr></thead><tbody>
        ${p.labs.map(l=>`<tr><td>${l.test}</td><td><strong>${l.val}</strong></td><td>${l.ref}</td></tr>`).join('')}
        </tbody></table></div></div>
      <div id="viz" class="tab-panel"><div class="content-section"><h3>Imaging</h3><p>${p.viz}</p></div></div>
      <div id="path" class="tab-panel"><div class="content-section"><h3>Pathology</h3><p>${p.pathology}</p></div></div>
      <div id="notes" class="tab-panel"><div class="content-section"><h3>Notes</h3><div class="note-entry">${p.notes}</div></div></div>
      <div id="meds" class="tab-panel"><div class="content-section"><h3>Meds</h3>
        ${p.meds.map(m=>`<div class="med-pill"><div class="dot" style="background:${m.color}"></div>${m.name} (${m.dose})</div>`).join('')}
      </div></div>
    </div>`;

  const tabs = host.querySelectorAll('.tab-btn');
  const panels = host.querySelectorAll('.tab-panel');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    panels.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    host.querySelector('#' + t.dataset.tab).classList.add('active');
  }));
  navTo('page-chart');
}

function discharge(id) {
  if(confirm("Discharge this patient and remove from active census?")) {
    const p = PATIENTS.find(x => x.id === id);
    p.active = false;
    navTo('page-main');
  }
}

buildCensus();
</script>
</body>
</html>
