<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta EHR</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* """ GLOBAL DESIGN SYSTEM """ */
:root {
  --unc: #4B9CD3;
  --unc-light: #d6eaf7;
  --unc-mid: #a8d0ec;
  --unc-dark: #2a6fa8;
  --navy: #13294B;
  --bg: #f9fbfd;
  --white: #ffffff;
  --border: #e4eff7;
  --text: #1a1a1a;
  --muted: #8a9aaa;
  --warn: #c67c00;
  --danger: #c0392b;
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

/* ── ROUTING ── */
.page { display: none; min-height: 100vh; flex-direction: column; width: 100%; }
.page.active { display: flex; }

/* ── LOGIN ── */
#page-login { align-items: center; justify-content: center; background: linear-gradient(160deg, #e8f4fc 0%, #f9fbfd 50%, #d6eaf7 100%); }
.login-card { background: var(--white); border-radius: 24px; box-shadow: 0 32px 80px rgba(75,156,211,.14); padding: 48px 44px; width: 420px; max-width: 90%; text-align: center; animation: fadeUp .5s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.login-logo { font-family: 'Lora', serif; font-size: 28px; margin-bottom: 4px; }
.form-group { margin-bottom: 18px; text-align: left; }
.form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.form-input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); background: #f8fbfe; outline: none; }
.login-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--navy); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
.demo-btn { width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid var(--unc); background: white; color: var(--unc-dark); font-weight: 600; cursor: pointer; margin-top: 12px; transition: background 0.2s; }

/* ── CENSUS ── */
.topnav { height: 56px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'Lora', serif; font-size: 20px; color: var(--text); }
.census-header { padding: 24px 28px; display: flex; justify-content: space-between; align-items: flex-end; }
.census-table { width: 100%; border-collapse: collapse; min-width: 760px; margin-bottom: 40px; }
.census-table th { padding: 12px; text-align: left; font-size: 10px; text-transform: uppercase; color: var(--unc); border-bottom: 1px solid var(--border); }
.census-table td { padding: 16px 12px; border-bottom: 1px solid #eef5fb; font-size: 13.5px; }
.acuity-box { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'DM Mono'; }
.esi-1, .esi-2 { background: #fde8e8; color: #c0392b; }
.esi-3 { background: #fef3dc; color: #7a5010; }
.esi-4, .esi-5 { background: #e1f5eb; color: #1a5c38; }
.open-btn { padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: white; color: var(--unc-dark); font-weight: 600; font-size: 11px; cursor: pointer; }

/* ── CHART ── */
.chart-card { max-width: 860px; margin: 32px auto; background: var(--white); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(75,156,211,.10); overflow: hidden; }
.patient-row { padding: 20px 28px; display: flex; align-items: flex-start; gap: 16px; background: #f4f9fd; border-bottom: 1px solid var(--border); }
.avatar { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--unc-mid), var(--unc)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
.tabs-bar { display: flex; flex-wrap: wrap; background: var(--white); padding: 0 20px; border-bottom: 1px solid var(--border); }
.tab-break { width: 100%; height: 0; border-top: 1px solid var(--border); }
.tab-btn { padding: 11px 15px; font-size: 13px; color: var(--muted); cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--unc); font-weight: 600; }
.tab-panel { display: none; }
.tab-panel.active { display: block; padding-bottom: 40px; }

/* Components */
.vitals-grid { display: flex; gap: 12px; flex-wrap: wrap; padding: 26px 28px; }
.vital-card { flex: 1; min-width: 100px; background: #f4f9fd; border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; text-align: center; }
.vital-val { font-size: 26px; font-family: 'Lora', serif; }
.trends-section { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 28px; }
.trend-card { background: #f4f9fd; border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
.bar-bg { flex: 1; height: 7px; background: #deedf7; border-radius: 100px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--unc); border-radius: 100px; }

.content-section { padding: 24px 28px; }
.content-section h3 { font-family: 'Lora'; font-weight: 400; margin-bottom: 16px; font-size: 17px; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { text-align: left; font-size: 10px; text-transform: uppercase; color: var(--unc); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.data-table td { padding: 12px 0; font-size: 13.5px; border-bottom: 1px solid #f0f6fb; }
.note-entry { border-left: 3px solid var(--unc-light); padding: 12px 16px; margin-bottom: 14px; background: #f8fbfe; border-radius: 0 10px 10px 0; }
.med-pill { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 12px; background: #f4f9fd; border-radius: 12px; border: 1px solid var(--border); }
.dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">Carta</div>
    <p style="color:var(--muted); font-size:13px; margin-bottom:30px;">Physician-first electronic health record</p>
    <div class="form-group"><label class="form-label">Username</label><input type="text" class="form-input" placeholder="npi@unc.edu"></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="••••••••"></div>
    <button class="login-btn" onclick="navTo('page-main')">Sign In</button>
    <button class="demo-btn" onclick="navTo('page-main')">View Interactive Demo</button>
  </div>
</div>

<div id="page-main" class="page">
  <nav class="topnav">
    <span class="nav-logo">Carta</span>
    <div style="width:1px; height:20px; background:var(--border); margin:0 10px;"></div>
    <span style="font-size:12px; font-weight:600; color:var(--unc-dark); background:var(--unc-light); padding:4px 11px; border-radius:100px;">ER</span>
    <div style="flex:1"></div>
    <div style="width:32px; height:32px; background:var(--unc); border-radius:10px; color:white; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; cursor:pointer;" onclick="navTo('page-login')">DR</div>
  </nav>
  <div class="census-header">
    <div><h2 style="font-family:'Lora';">Emergency Census</h2><p style="font-size:12px; color:var(--muted)">Monday, March 23, 2026</p></div>
  </div>
  <div style="padding: 0 28px;">
    <table class="census-table">
      <thead><tr><th>ESI</th><th>Patient</th><th>Room</th><th>Complaint</th><th>Vitals</th><th>Status</th><th></th></tr></thead>
      <tbody id="census-body"></tbody>
    </table>
  </div>
</div>

<div id="page-chart" class="page">
  <nav class="topnav">
    <button class="open-btn" onclick="navTo('page-main')">← Back to Census</button>
    <span class="nav-logo" style="margin-left:20px">Carta</span>
  </nav>
  <div id="chart-content"></div>
</div>

<script>

/* """ LOGIC: ROUTING """ */
function navTo(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  window.scrollTo(0,0);
}

/* """ LOGIC: CENSUS """ */
function buildCensus() {
  const body = document.getElementById('census-body');
  body.innerHTML = PATIENTS.map(p => `
    <tr onclick="openChart('${p.id}')">
      <td><div class="acuity-box esi-${p.esi}">${p.esi}</div></td>
      <td><strong>${p.name}</strong><br><small>${p.age} · ${p.mrn}</small></td>
      <td><strong>${p.room}</strong></td>
      <td>${p.cc}</td>
      <td style="font-family:'DM Mono'">${p.vitals.bp} | ${p.vitals.hr}</td>
      <td><span class="dot" style="background:${p.esi <= 2 ? 'var(--danger)' : 'var(--warn)'}; display:inline-block"></span> Admit Pending</td>
      <td><button class="open-btn">Open →</button></td>
    </tr>
  `).join('');
}

/* """ LOGIC: CHART BUILDER """ */
function openChart(pid) {
  const p = PATIENTS.find(x => x.id === pid);
  const host = document.getElementById('chart-content');
  
  host.innerHTML = `
    <div class="chart-card">
      <div class="patient-row">
        <div class="avatar">${p.name.split(' ').map(n=>n[0]).join('')}</div>
        <div class="patient-info">
          <div class="patient-name">${p.name}</div>
          <div class="patient-meta">${p.age} · DOB 03/14/1963 · MRN ${p.mrn} · Admitted ${p.admitted}</div>
          <div class="patient-meta">Attending: ${p.attending} · ${p.cc}</div>
        </div>
        <div class="badges">
          ${p.flags.map(f => `<span class="badge ${f.includes('PCN')?'badge-pcn':f.includes('DNR')?'badge-dnr':'badge-cap'}">${f}</span>`).join('')}
        </div>
      </div>

      <div class="tabs-bar">
        <button class="tab-btn active" data-tab="vitals">Vitals</button>
        <button class="tab-btn" data-tab="history">History</button>
        <button class="tab-btn" data-tab="physical">Physical</button>
        <button class="tab-btn" data-tab="ems">EMS Notes</button>
        <button class="tab-btn" data-tab="er">ER Notes</button>
        <div class="tab-break"></div>
        <button class="tab-btn" data-tab="labs">Labs</button>
        <button class="tab-btn" data-tab="viz">Visualizations</button>
        <button class="tab-btn" data-tab="path">Pathology</button>
        <button class="tab-btn" data-tab="notes">Progress Notes</button>
        <button class="tab-btn" data-tab="meds">Medications</button>
      </div>

      <div id="vitals" class="tab-panel active">
        <div class="vitals-grid">
          <div class="vital-card"><div class="vital-val">${p.vitals.bp}</div><div style="font-size:10px; color:var(--muted)">BP MMHG</div></div>
          <div class="vital-card"><div class="vital-val" style="color:${parseInt(p.vitals.hr)>100?'var(--danger)':'var(--text)'}">${p.vitals.hr}</div><div style="font-size:10px; color:var(--muted)">HR BPM</div></div>
          <div class="vital-card"><div class="vital-val" style="color:${parseFloat(p.vitals.temp)>38?'var(--danger)':'var(--text)'}">${p.vitals.temp}°</div><div style="font-size:10px; color:var(--muted)">TEMP °C</div></div>
          <div class="vital-card"><div class="vital-val">${p.vitals.spo2}</div><div style="font-size:10px; color:var(--muted)">SPO2</div></div>
        </div>
        <div class="trends-section">
          <div class="trend-card">
            <div style="font-size:10px; font-weight:600; color:var(--unc); margin-bottom:12px; text-transform:uppercase">BP Trend</div>
            <div style="font-size:12px; display:flex; align-items:center; margin-bottom:8px">3/22 <div class="bar-bg"><div class="bar-fill" style="width:80%"></div></div> 118/76</div>
            <div style="font-size:12px; display:flex; align-items:center">3/23 <div class="bar-bg"><div class="bar-fill" style="width:85%"></div></div> 122/80</div>
          </div>
          <div class="trend-card">
             <div style="font-size:10px; font-weight:600; color:var(--unc); margin-bottom:12px; text-transform:uppercase">Temp Trend</div>
             <div style="font-size:12px; display:flex; align-items:center; margin-bottom:8px">3/22 <div class="bar-bg"><div class="bar-fill" style="width:70%; background:var(--warn)"></div></div> 38.4°</div>
             <div style="font-size:12px; display:flex; align-items:center">3/23 <div class="bar-bg"><div class="bar-fill" style="width:90%; background:var(--danger)"></div></div> 38.9°</div>
          </div>
        </div>
      </div>

      <div id="history" class="tab-panel"><div class="content-section"><h3>Medical History</h3><p>${p.history}</p></div></div>
      <div id="physical" class="tab-panel"><div class="content-section"><h3>Recent Physical Exam</h3><p>${p.physical}</p></div></div>
      <div id="ems" class="tab-panel"><div class="content-section"><h3>EMS Run Notes</h3><p>${p.ems}</p></div></div>
      <div id="er" class="tab-panel"><div class="content-section"><h3>Emergency Department Evaluation</h3><p>${p.er}</p></div></div>
      
      <div id="labs" class="tab-panel">

            <tbody>
              ${p.labs.map(l => `<tr><td>${l.test}</td><td><strong style="color:${l.status==='N'?'var(--text)':l.status==='H'?'var(--danger)':'var(--warn)'}">${l.val}</strong></td><td>${l.ref}</td><td>${l.status}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div id="viz" class="tab-panel"><div class="content-section"><h3>Visualizations</h3><p style="color:var(--muted)">Radiology imaging and trend graphs loading...</p></div></div>
      <div id="path" class="tab-panel"><div class="content-section"><h3>Pathology & Microbiology</h3><p>${p.pathology}</p></div></div>
      <div id="notes" class="tab-panel"><div class="content-section"><h3>Progress Notes</h3><div class="note-entry">${p.notes}</div></div></div>
      
      <div id="meds" class="tab-panel">
        <div class="content-section">
          <h3>Active Medications</h3>
          ${p.meds.map(m => `<div class="med-pill"><div class="dot" style="background:${m.color}"></div><div><strong>${m.name}</strong><br><small>${m.dose}</small></div></div>`).join('')}
        </div>
      </div>
    </div>
  `;

  // Re-wire tabs for the new chart
  const tabs = host.querySelectorAll('.tab-btn');
  const panels = host.querySelectorAll('.tab-panel');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    panels.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    host.querySelector('#' + t.dataset.tab).classList.add('active');
  }));

  navTo('page-chart');
}

buildCensus();
</script>
</body>
</html>
