<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta EHR</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --unc:       #4B9CD3;
      --unc-light: #d6eaf7;
      --unc-mid:   #a8d0ec;
      --unc-dark:  #2a6fa8;
      --navy:      #13294B;
      --bg:        #fcfbf9;
      --white:     #ffffff;
      --border:    #e4eff7;
      --text:      #111827;
      --muted:     #6b7280;
      --danger:    #c0392b;
      --danger-bg: #fde8e8;
      --warn:      #c67c00;
      --warn-bg:   #fef3dc;
      --ok:        #1a5c38;
      --ok-bg:     #e1f5eb;
      --radius:    18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; }
    #page-login { flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(160deg, #e8f4fc 0%, #fcfbf9 50%, #d6eaf7 100%); position: relative; overflow: hidden; }
    .login-card { background: var(--white); border-radius: 24px; box-shadow: 0 2px 8px rgba(75,156,211,.08), 0 32px 80px rgba(75,156,211,.14); padding: 48px 44px 40px; width: 420px; max-width: calc(100vw - 32px); position: relative; z-index: 1; animation: fadeUp .5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .login-logo { font-family: 'Lora', serif; font-size: 28px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; margin-bottom: 4px; }
    .login-tagline { font-size: 13px; color: var(--muted); margin-bottom: 36px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 11.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .form-input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: #f8fbfe; outline: none; }
    .login-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .demo-btn { width: 100%; padding: 13px; border-radius: 10px; border: 1.5px solid var(--unc); background: var(--white); color: var(--unc-dark); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    #page-main { flex-direction: column; background: var(--bg); }
    .topnav { height: 56px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 24px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Lora', serif; font-size: 20px; font-weight: 500; color: var(--text); flex-shrink: 0; }
    .nav-divider { width: 1px; height: 20px; background: var(--border); }
    .nav-dept { font-size: 12px; font-weight: 600; color: var(--unc-dark); background: var(--unc-light); padding: 4px 11px; border-radius: 100px; }
    .nav-links { display: flex; gap: 4px; flex: 1; }
    .nav-link { padding: 6px 14px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: var(--muted); cursor: pointer; border: none; background: transparent; font-family: 'DM Sans', sans-serif; }
    .nav-link.active { background: var(--unc-light); color: var(--unc-dark); font-weight: 600; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
    .nav-avatar { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, var(--unc-mid), var(--unc)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; cursor: pointer; }
    .census-header { padding: 24px 28px 0; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .census-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; color: var(--text); }
    .stat-pills { display: flex; gap: 10px; }
    .stat-pill { display: flex; flex-direction: column; align-items: center; padding: 10px 18px; border-radius: 12px; border: 1px solid var(--border); background: var(--white); min-width: 72px; }
    .stat-pill-n { font-family: 'Lora', serif; font-size: 22px; color: var(--text); }
    .stat-pill-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 5px; }
    .census-table-wrap { padding: 16px 28px 32px; overflow-x: auto; }
    .census-table { width: 100%; border-collapse: collapse; min-width: 760px; }
    .census-table th { padding: 10px 12px; text-align: left; font-size: 10.5px; font-weight: 600; text-transform: uppercase; color: var(--unc); border-bottom: 1px solid var(--border); }
    .census-table td { padding: 14px 12px; font-size: 13.5px; border-bottom: 1px solid #eef5fb; }
    .acuity { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .esi-1, .esi-2 { background: #fde8e8; color: #c0392b; }
    .esi-3 { background: var(--warn-bg); color: #7a5010; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot-red { background: var(--danger); }
    .dot-amber { background: #e8a020; }
    .flag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; margin-right: 4px; }
    .flag-allergy { background: var(--danger-bg); color: #9b3535; }
    .vital-inline { font-family: 'DM Mono', monospace; font-size: 12.5px; }
    .vital-inline.warn { color: var(--warn); font-weight: 600; }
    .open-btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--white); font-size: 12px; font-weight: 600; color: var(--unc-dark); cursor: pointer; }
    #page-chart { flex-direction: column; background: var(--bg); }
    .chart-topbar { height: 56px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; }
    .chart-card { max-width: 900px; margin: 32px auto; background: var(--white); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(75,156,211,.10); overflow: hidden; }
    .c-patient-row { padding: 20px 28px; display: flex; align-items: flex-start; gap: 16px; background: #f4f9fd; border-bottom: 1px solid var(--border); }
    .c-tabs { display: flex; flex-wrap: wrap; padding: 0 20px; border-bottom: 1px solid var(--border); }
    .tab-btn { padding: 11px 15px; font-size: 13px; cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; }
    .tab-btn.active { border-bottom-color: var(--unc); font-weight: 600; color: var(--text); }
    .tab-panel { display: none; padding: 24px 28px; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">Carta</div>
    <div class="login-tagline">Physician-first electronic health record</div>
    <div class="form-group">
      <label class="form-label">NPI or Username</label>
      <input class="form-input" id="login-user" type="text" placeholder="npi@unc.edu">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="login-pass" type="password" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="doLogin()">Sign in to Carta</button>
    <button class="demo-btn" onclick="doDemo()">View Interactive Demo</button>
  </div>
</div>

<div id="page-main" class="page">
  <nav class="topnav">
    <span class="nav-logo">Carta</span>
    <div class="nav-divider"></div>
    <span class="nav-dept">ER</span>
    <div class="nav-links">
      <button class="nav-link active">Census</button>
      <button class="nav-link">Tasks</button>
    </div>
    <div class="nav-right">
      <span class="nav-time" id="nav-clock">00:00 AM</span>
      <div class="nav-avatar" onclick="doLogout()">DR</div>
    </div>
  </nav>
  <div class="census-header">
    <div>
      <div class="census-title">Emergency Department Census</div>
    </div>
    <div class="stat-pills">
      <div class="stat-pill"><span class="stat-pill-n">34</span><span class="stat-pill-l">Total</span></div>
      <div class="stat-pill"><span class="stat-pill-n" style="color:var(--danger)">4</span><span class="stat-pill-l">Critical</span></div>
    </div>
  </div>
  <div class="census-table-wrap">
    <table class="census-table">
      <thead>
        <tr><th>ESI</th><th>Patient</th><th>Room</th><th>Chief Complaint</th><th>Vitals</th><th>Status</th><th>Time</th><th></th></tr>
      </thead>
      <tbody id="census-body"></tbody>
    </table>
  </div>
</div>

<div id="page-chart" class="page">
  <div class="chart-topbar">
    <button class="back-btn" onclick="showPage('main')">← Back to Census</button>
  </div>
  <div class="chart-card" id="chart-content"></div>
</div>

<script>
  const PATIENTS = [
    { id:'p1', esi:2, name:'Robert Nguyen', age:'58M', mrn:'0031042', room:'T1', cc:'Chest pain', bp:'88/54', hr:'118', status:'dot-red', statusTxt:'Cath Lab Pending', time:'0:22' },
    { id:'p5', esi:3, name:'Sarah Chen', age:'62F', mrn:'0042817', room:'12', cc:'Cough / Fever', bp:'118/76', hr:'101', status:'dot-amber', statusTxt:'Admit Pending', time:'4:32' }
  ];

  function updateClock() {
    document.getElementById('nav-clock').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  }
  setInterval(updateClock, 1000);

  function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
  }

  function doLogin() { if(document.getElementById('login-user').value) showPage('main'); }
  function doDemo() { buildCensus(); showPage('main'); }
  function doLogout() { showPage('login'); }

  function buildCensus() {
    document.getElementById('census-body').innerHTML = PATIENTS.map(p => `
      <tr onclick="openChart('${p.id}')">
        <td><div class="acuity esi-${p.esi}">${p.esi}</div></td>
        <td><strong>${p.name}</strong><br><small>${p.age} · ${p.mrn}</small></td>
        <td>${p.room}</td>
        <td>${p.cc}</td>
        <td><span class="vital-inline">${p.bp}</span> | <span class="vital-inline">${p.hr}</span></td>
        <td><span class="status-dot ${p.status}"></span>${p.statusTxt}</td>
        <td>${p.time}</td>
        <td><button class="open-btn">Open →</button></td>
      </tr>
    `).join('');
  }

  function openChart(id) {
    const p = PATIENTS.find(x => x.id === id);
    document.getElementById('chart-content').innerHTML = `
      <div class="c-patient-row">
        <div><div class="c-name">${p.name}</div><div style="color:var(--muted)">MRN ${p.mrn} · ${p.cc}</div></div>
      </div>
      <div class="c-tabs">
        <button class="tab-btn active">Vitals</button>
        <button class="tab-btn">Labs</button>
        <button class="tab-btn">Notes</button>
      </div>
      <div class="tab-panel active">
        <h3>Current Vitals</h3>
        <p>BP: ${p.bp} | HR: ${p.hr} | Temp: 38.9°C</p>
      </div>
    `;
    showPage('chart');
  }
  buildCensus();
</script>
</body>
</html>
